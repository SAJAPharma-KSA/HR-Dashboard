  :root{
    color-scheme:light;
    --text:#14233B; --muted:#5A6B7B; --muted2:#8A9AA8;
    --green:#16A34A; --green-d:#15803D; --teal:#0E9C86; --teal-d:#0C7363;
    --blue:#2563EB; --blue-d:#1D4ED8; --gold:#C9821A; --red:#DC3545; --pink:#D8568F;
    --glass:#FFFFFF; --glass2:#FFFFFF;
    --gline:rgba(20,35,59,.08); --border:rgba(20,35,59,.08); --track:#E9EFF6;
    --bg0:#FFFFFF; --bg1:#F4F7FC; --bg2:#EEF3FA;
    --shadow:0 8px 28px rgba(20,40,80,.07);
    --ease:cubic-bezier(.22,1,.36,1);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{color-scheme:light}
  html,body{color:var(--text);font-family:'Cairo','Tajawal','Sakkal Majalla','Segoe UI',Tahoma,Arial,sans-serif;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  body{min-height:100vh;overflow-x:clip;background:
    radial-gradient(1200px 720px at 82% -12%, rgba(37,99,235,.05), transparent 60%),
    radial-gradient(1000px 640px at -5% 112%, rgba(14,156,134,.05), transparent 56%),
    linear-gradient(160deg,var(--bg0),var(--bg1) 55%,var(--bg2))}
  .num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
  ::-webkit-scrollbar{height:10px;width:10px}
  ::-webkit-scrollbar-thumb{background:linear-gradient(var(--teal),var(--blue));border-radius:9px;border:2px solid transparent;background-clip:padding-box}
  ::-webkit-scrollbar-thumb:hover{background:linear-gradient(var(--teal-d),var(--blue-d));background-clip:padding-box}
  ::-webkit-scrollbar-track{background:transparent}

  /* ===== background parallax + glow layers (very subtle on light) ===== */
  #bglayer{position:fixed;inset:-48px;z-index:-2;will-change:transform;transition:transform .3s ease-out;
    background:
      radial-gradient(680px 680px at 22% 18%, rgba(14,156,134,.07), transparent 60%),
      radial-gradient(700px 700px at 82% 80%, rgba(37,99,235,.06), transparent 60%),
      radial-gradient(520px 520px at 60% 4%, rgba(201,130,26,.04), transparent 62%);
    filter:blur(12px)}
  #bgveil{position:fixed;inset:0;z-index:-1;pointer-events:none;
    background:
      radial-gradient(820px 620px at var(--vx,22%) 12%, rgba(14,156,134,.045), transparent 60%),
      radial-gradient(760px 580px at var(--vx2,82%) 90%, rgba(37,99,235,.04), transparent 62%),
      radial-gradient(circle at 50% -10%, transparent 45%, rgba(238,243,250,.55) 82%);
    background-repeat:no-repeat;animation:bgveil 34s ease-in-out infinite alternate}
  @keyframes bgveil{0%{--vx:22%;--vx2:82%;background-position:0 0,0 0,0 0}100%{--vx:30%;--vx2:74%;background-position:3% 2%,-2% -1%,0 0}}
  @media (prefers-reduced-motion: reduce){ #bgveil{animation:none} }

  /* ===== splash ===== */
  .splash{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(900px 720px at 50% 45%, #FFFFFF, #EAF1F9 78%)}
  .splash .ov{position:absolute;inset:0;background:rgba(244,247,252,.6);backdrop-filter:blur(4px)}
  .splash img{width:min(58vw,440px);position:relative;z-index:2;filter:drop-shadow(0 10px 26px rgba(14,156,134,.28))}
  .splash .halo{position:absolute;z-index:1;width:min(64vw,520px);height:min(64vw,520px);border-radius:50%;
    background:radial-gradient(circle, rgba(14,156,134,.22), transparent 62%);filter:blur(22px)}

  /* ===== shell + topbar ===== */
  .shell{max-width:1280px;margin:0 auto;padding:22px 22px 90px}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:13px 20px;
    background:#FFFFFF;border:1px solid #E4EBF3;border-radius:0 0 18px 18px;
    margin:0 0 22px;position:sticky;top:0;z-index:300;flex-wrap:wrap;box-shadow:0 6px 22px rgba(20,40,80,.10);overflow:hidden}
  .topbar::after{content:"";position:absolute;inset:0 0 auto 0;height:3px;background:linear-gradient(90deg,var(--green),var(--teal),var(--blue));opacity:.9;pointer-events:none}
  .tb-left{display:flex;align-items:center;gap:13px}
  .tb-left img{height:38px;filter:drop-shadow(0 4px 10px rgba(14,156,134,.22))}
  .tb-title{font-size:17px;font-weight:800;letter-spacing:.3px;color:var(--text)}
  .tb-sub{font-size:12px;color:var(--muted)}
  .tb-right{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .qsel{display:flex;gap:4px;background:#F2F6FB;padding:5px;border-radius:13px;border:1px solid var(--gline)}
  .qsel button{border:none;background:transparent;color:var(--muted);font-weight:800;font-size:13px;padding:8px 14px;border-radius:9px;cursor:pointer;transition:.18s var(--ease);font-family:inherit}
  .qsel button:hover{color:var(--text);background:rgba(20,35,59,.05)}
  .qsel button.on{background:linear-gradient(135deg,var(--green),var(--teal));color:#fff;box-shadow:0 6px 16px rgba(22,163,74,.28)}
  .qsel button.annual.on{background:linear-gradient(135deg,var(--blue),var(--blue-d));color:#fff;box-shadow:0 6px 16px rgba(37,99,235,.28)}
  .ghost{border:1px solid var(--gline);background:#FFFFFF;color:var(--muted);font-weight:700;font-size:13px;padding:10px 16px;border-radius:11px;cursor:pointer;transition:.18s var(--ease);font-family:inherit}
  .ghost:hover{color:var(--text);border-color:var(--teal);transform:translateY(-1px);box-shadow:0 8px 18px rgba(14,156,134,.14)}
  .ghost.live{color:var(--gold);border-color:rgba(201,130,26,.45);background:rgba(201,130,26,.08)}

  /* ===== control bar: tabs + dept filter ===== */
  .ctrlbar{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:24px;flex-wrap:wrap}
  .tabs{display:flex;gap:10px;flex-wrap:wrap}
  .tab{border:1px solid var(--gline);background:#FFFFFF;color:var(--muted);font-weight:700;font-size:14px;padding:12px 18px;border-radius:14px;cursor:pointer;transition:.2s var(--ease);display:flex;align-items:center;gap:9px;min-width:112px;justify-content:center;font-family:inherit;box-shadow:0 3px 12px rgba(20,40,80,.05)}
  .tab .ic{width:8px;height:8px;border-radius:50%;background:var(--muted2);transition:.2s}
  .tab:hover{color:var(--text);transform:translateY(-2px);border-color:rgba(14,156,134,.4);box-shadow:0 10px 22px rgba(20,40,80,.1)}
  .tab:hover .ic{background:var(--teal);box-shadow:0 0 9px rgba(14,156,134,.6)}
  .tab.active{color:#fff;background:linear-gradient(135deg,var(--green),var(--teal-d));border-color:transparent;box-shadow:0 12px 26px rgba(22,163,74,.3)}
  .tab.active .ic{background:#fff;box-shadow:0 0 8px rgba(255,255,255,.7)}
  .deptpick{display:flex;align-items:center;gap:10px;background:#FFFFFF;border:1px solid var(--gline);border-radius:14px;padding:9px 13px;box-shadow:0 6px 18px rgba(20,40,80,.06)}
  .deptpick label{font-size:12.5px;font-weight:800;color:var(--muted);white-space:nowrap}
  .deptpick select{border:1px solid var(--gline);background:#F7FAFD;border-radius:10px;padding:10px 13px;font-size:14px;font-weight:700;color:var(--text);outline:none;cursor:pointer;font-family:inherit;transition:.16s}
  .deptpick select:hover{border-color:rgba(14,156,134,.4)}
  .deptpick select:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(14,156,134,.15)}
  .dept-banner{display:flex;align-items:center;gap:10px;background:linear-gradient(90deg,rgba(37,99,235,.1),rgba(37,99,235,.02));border:1px solid rgba(37,99,235,.22);border-radius:14px;padding:13px 17px;margin-bottom:18px;font-size:13.5px;color:var(--blue-d);font-weight:700}
  .dept-banner b{color:var(--text)}
  .dept-banner button{margin-left:auto;background:rgba(37,99,235,.12);border:1px solid rgba(37,99,235,.25);color:var(--blue-d);font-weight:800;border-radius:9px;padding:7px 14px;cursor:pointer;transition:.16s;font-family:inherit}
  .dept-banner button:hover{background:rgba(37,99,235,.2)}
  .cw{display:inline-block;font-size:10.5px;font-weight:800;color:var(--muted);background:rgba(90,107,123,.12);border-radius:7px;padding:3px 9px;margin-left:8px;vertical-align:middle;text-transform:uppercase;letter-spacing:.4px}

  /* ===== sections ===== */
  .secblock{margin-bottom:38px}
  .secbar{display:flex;align-items:center;gap:12px;margin-bottom:18px;padding:15px 22px;
    background:linear-gradient(90deg,rgba(14,156,134,.92),rgba(37,99,235,.6));border:1px solid rgba(255,255,255,.4);
    border-radius:16px;box-shadow:0 12px 30px rgba(14,156,134,.22);position:relative;overflow:hidden;
    -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px)}
  .secbar::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:linear-gradient(var(--green),var(--blue));z-index:2}
  .secbar::after{content:"";position:absolute;top:0;left:-65%;width:45%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.45),transparent);transform:skewX(-20deg);animation:sheen 5s ease-in-out infinite;pointer-events:none}
  @keyframes sheen{0%{left:-65%}60%{left:130%}100%{left:130%}}
  .secbar h2{font-size:21px;font-weight:800;letter-spacing:.5px;color:#fff;padding-left:6px;position:relative;z-index:2;text-shadow:0 1px 6px rgba(0,0,0,.18)}

  .grid{display:grid;gap:16px}
  .g5{grid-template-columns:repeat(5,1fr)} .g4{grid-template-columns:repeat(4,1fr)} .g3{grid-template-columns:repeat(3,1fr)} .g2{grid-template-columns:repeat(2,1fr)}
  .g6{grid-template-columns:repeat(6,1fr)}
  @media(max-width:1200px){.g6{grid-template-columns:repeat(3,1fr)}}
  @media(max-width:680px){.g6{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:480px){.g6{grid-template-columns:1fr}}
  @media(max-width:1100px){.g5{grid-template-columns:repeat(3,1fr)}}
  @media(max-width:920px){.g4,.g3{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:680px){.g5{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:600px){.g4,.g3,.g2{grid-template-columns:1fr}}
  @media(max-width:480px){.g5{grid-template-columns:1fr}}

  .card{background:#FFFFFF;border:1px solid var(--gline);border-radius:18px;padding:20px;position:relative;overflow:hidden;box-shadow:0 6px 20px rgba(20,40,80,.06);transition:transform .25s var(--ease),box-shadow .25s var(--ease),border-color .25s var(--ease)}
  .card:hover{transform:translateY(-3px);border-color:rgba(14,156,134,.28);box-shadow:0 16px 38px rgba(20,40,80,.12)}
  .card.wide{grid-column:1/-1}
  .card-lbl{font-size:12px;color:var(--muted);font-weight:700;letter-spacing:.6px;text-transform:uppercase}
  .card-title{font-size:15.5px;font-weight:800;color:var(--text);margin-bottom:14px;text-align:center}
  .stat{font-size:42px;font-weight:800;line-height:1.05;margin-top:9px;letter-spacing:-1.5px;color:var(--text)}
  .stat.sm{font-size:31px}
  .pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:800;padding:5px 11px;border-radius:20px;margin-top:12px}
  .pill.ok{background:rgba(22,163,74,.12);color:var(--green-d);border:1px solid rgba(22,163,74,.22)}
  .pill.bad{background:rgba(220,53,69,.1);color:var(--red);border:1px solid rgba(220,53,69,.25)}
  .pill.neu{background:rgba(90,107,123,.1);color:var(--muted);border:1px solid rgba(90,107,123,.18)}
  .ringwrap{display:flex;flex-direction:column;align-items:center;text-align:center}
  .legend{display:flex;gap:16px;margin-top:14px;flex-wrap:wrap;justify-content:center}
  .legend span{font-size:12.5px;color:var(--muted);display:flex;align-items:center;gap:7px}
  .dot{width:11px;height:11px;border-radius:4px}
  .kv{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border)}
  .kv:last-child{border-bottom:none}
  .kv .k{font-size:14px;color:var(--muted)} .kv .v{font-size:15px;font-weight:800;color:var(--text)}
  .money{font-size:31px;font-weight:800;letter-spacing:-1px;color:var(--text)}
  .money .cur{font-size:15px;color:var(--gold);font-weight:800;margin-right:5px}
  .scrollx{overflow-x:auto;padding-bottom:8px}
  .apx{min-height:10px}

  /* ===== L&D table ===== */
  table.ld{width:100%;border-collapse:collapse;font-size:13.5px}
  table.ld th,table.ld td{padding:10px 11px;text-align:center;border:1px solid var(--border)}
  table.ld thead th{background:linear-gradient(135deg,var(--teal-d),var(--teal));color:#fff;font-weight:800}
  table.ld .rowh{background:#F5F8FB;text-align:left;font-weight:700;color:var(--text)}
  table.ld td.n{color:var(--muted);font-weight:800}
  table.ld tbody tr:hover td{background:#F7FAFD}

  /* ===== kpi box ===== */
  .kpibox{background:#FFFFFF;border:1px solid var(--gline);border-radius:16px;overflow:hidden;box-shadow:0 6px 20px rgba(20,40,80,.06);transition:transform .25s var(--ease),box-shadow .25s var(--ease)}
  .kpibox:hover{transform:translateY(-3px);box-shadow:0 16px 38px rgba(20,40,80,.12)}
  .kpibox .h{background:linear-gradient(135deg,var(--teal-d),var(--teal));color:#fff;font-size:13.5px;font-weight:800;padding:11px;text-align:center}
  .kpibox .b{padding:20px;display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap}
  .kpibox .big{font-size:31px;font-weight:800;color:var(--teal-d)}

  /* ===== turnover panel ===== */
  .tp-head{display:flex;align-items:center;gap:12px;margin-bottom:16px}
  .tp-icon{width:42px;height:42px;border-radius:13px;background:linear-gradient(135deg,var(--green),var(--teal));display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;box-shadow:0 8px 18px rgba(22,163,74,.3)}
  .tp-head h3{font-size:17px;font-weight:800;color:var(--text)}
  .tp-head p{font-size:12px;color:var(--muted)}
  .qbadge{margin-left:auto;background:linear-gradient(135deg,var(--green),var(--teal));color:#fff;font-weight:800;font-size:12px;padding:8px 15px;border-radius:18px;box-shadow:0 6px 14px rgba(22,163,74,.26)}
  .tp-hero{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:6px}
  @media(max-width:600px){.tp-hero{grid-template-columns:1fr}}
  .tp-box{background:#F7FAFD;border:1px solid var(--gline);border-radius:14px;padding:17px;transition:.2s var(--ease)}
  .tp-box:hover{border-color:rgba(14,156,134,.3);background:#F2F8F6}
  .tp-box .lbl{font-size:12.5px;font-weight:700;color:var(--muted)}
  .tp-box .big{font-size:37px;font-weight:800;letter-spacing:-1.5px;line-height:1.05;margin-top:4px;color:var(--text)}
  .tp-delta{font-size:13.5px;font-weight:800;margin-top:6px;display:flex;align-items:center;gap:6px}
  .tp-delta .vs{color:var(--muted);font-weight:600}
  .tp-sub{font-size:12px;color:var(--muted);margin-top:4px}
  .tp-dept{margin-top:18px}
  .tp-dept-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .tp-dept-h .t{display:flex;align-items:center;gap:9px;font-size:14.5px;font-weight:800;color:var(--text)}
  .tp-dept-h .t .sq{width:28px;height:28px;border-radius:9px;background:linear-gradient(135deg,var(--blue),var(--teal));display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px}
  .tp-row{display:grid;grid-template-columns:150px 1fr 52px 80px;gap:12px;align-items:center;padding:9px 0;border-top:1px solid var(--border)}
  @media(max-width:600px){.tp-row{grid-template-columns:100px 1fr 42px 60px;gap:8px}}
  .tp-row .nm{display:flex;align-items:center;gap:9px;font-weight:700;font-size:13px;color:var(--text)}
  .tp-row .nm .sq{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;flex-shrink:0}
  .tp-bar{height:12px;background:var(--track);border-radius:7px;overflow:hidden}
  .tp-bar > div{height:100%;border-radius:7px;transition:width 1s var(--ease)}
  .tp-pct{font-weight:800;font-size:14px;text-align:right;color:var(--text)} .tp-cnt{color:var(--muted);font-size:12px;text-align:right}
  .tp-foot{font-size:11.5px;color:var(--muted2);margin-top:13px;font-style:italic}

  /* ===== login ===== */
  .overlay{position:fixed;inset:0;z-index:200;background:rgba(20,35,59,.32);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:20px}
  .login-card{width:100%;max-width:390px;background:#FFFFFF;border:1px solid var(--gline);border-radius:22px;padding:34px 30px;box-shadow:0 30px 80px rgba(20,40,80,.22);position:relative}
  .login-card::after{content:"";position:absolute;inset:0 0 auto 0;height:4px;border-radius:22px 22px 0 0;background:linear-gradient(90deg,var(--green),var(--teal),var(--blue))}
  .login-card .lg{display:flex;align-items:center;gap:12px;margin-bottom:24px}
  .login-card .lg img{height:34px;filter:drop-shadow(0 4px 10px rgba(14,156,134,.25))}
  .login-card h3{font-size:16px;font-weight:800;color:var(--text)}
  .login-card p{font-size:12px;color:var(--muted)}
  .field{margin-bottom:16px}
  .field label{display:block;font-size:12.5px;color:var(--muted);margin-bottom:7px;font-weight:700}
  .input{width:100%;background:#F7FAFD;border:1px solid var(--gline);border-radius:12px;padding:13px 14px;color:var(--text);font-size:15px;outline:none;transition:.16s;font-family:inherit}
  .input::placeholder{color:var(--muted2)}
  .input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(14,156,134,.15);background:#fff}
  .btn{width:100%;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:800;cursor:pointer;transition:.18s var(--ease);color:#fff;background:linear-gradient(135deg,var(--green),var(--teal-d));box-shadow:0 12px 24px rgba(22,163,74,.28);font-family:inherit}
  .btn:hover{filter:brightness(1.05);transform:translateY(-2px);box-shadow:0 16px 32px rgba(22,163,74,.36)}
  .err{background:rgba(220,53,69,.1);border:1px solid rgba(220,53,69,.35);color:var(--red);font-size:13px;padding:11px 13px;border-radius:11px;margin-bottom:16px}
  .x{position:absolute;top:15px;right:17px;color:var(--muted);cursor:pointer;font-size:22px;background:none;border:none;transition:.16s}
  .x:hover{color:var(--text)}

  /* ===== admin ===== */
  .adm-card{background:#FFFFFF;border:1px solid var(--gline);border-radius:18px;padding:22px;margin-bottom:16px;box-shadow:0 6px 20px rgba(20,40,80,.06)}
  .adm-card h3{font-size:15px;font-weight:800;margin-bottom:16px;display:flex;align-items:center;gap:9px;color:var(--text)}
  .adm-card h3 .ic{width:9px;height:9px;border-radius:50%;background:var(--teal);box-shadow:0 0 10px rgba(14,156,134,.55)}
  .adm-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  @media(max-width:760px){.adm-grid{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:480px){.adm-grid{grid-template-columns:1fr}}
  .adm-f label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:600}
  .adm-f input,.adm-f select{width:100%;background:#F7FAFD;border:1px solid var(--gline);border-radius:10px;padding:10px 12px;color:var(--text);font-size:14px;outline:none;font-family:inherit;transition:.16s}
  .adm-f textarea{width:100%;min-height:150px;background:#F7FAFD;border:1px solid var(--gline);border-radius:10px;padding:11px 13px;color:var(--text);font-size:14px;outline:none;font-family:inherit;resize:vertical;line-height:1.8;transition:.16s}
  .adm-f textarea:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(14,156,134,.14);background:#fff}
  .adm-f input:focus,.adm-f select:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(14,156,134,.14);background:#fff}
  table.adm{width:100%;border-collapse:collapse;font-size:13px}
  table.adm th{font-size:11px;color:var(--muted);text-transform:uppercase;padding:7px;text-align:center;font-weight:800;letter-spacing:.4px}
  table.adm td{padding:5px 6px}
  table.adm td.dept{font-size:13px;color:var(--muted);white-space:nowrap;font-weight:600}
  table.adm input{width:100%;background:#F7FAFD;border:1px solid var(--gline);border-radius:8px;padding:8px;color:var(--text);font-size:13px;outline:none;text-align:center;transition:.16s}
  table.adm input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(14,156,134,.14);background:#fff}
  .tl-row{display:grid;grid-template-columns:1fr 110px 110px 70px 40px;gap:10px;align-items:center;margin-bottom:10px}
  @media(max-width:600px){.tl-row{grid-template-columns:1fr 70px 70px 52px 34px;gap:6px}}
  .tl-row input{background:#F7FAFD;border:1px solid var(--gline);border-radius:9px;padding:9px 11px;color:var(--text);font-size:13px;outline:none;width:100%;font-family:inherit;transition:.16s}
  .tl-row input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(14,156,134,.14);background:#fff}
  .tl-pct{font-weight:800;font-size:13.5px;text-align:center;color:var(--teal-d)}
  .tl-del{background:rgba(220,53,69,.1);border:1px solid rgba(220,53,69,.25);color:var(--red);border-radius:9px;padding:9px;cursor:pointer;font-weight:800;transition:.16s}
  .tl-del:hover{background:rgba(220,53,69,.18)}
  .tl-add{margin-top:7px;background:linear-gradient(135deg,var(--green),var(--teal));border:none;color:#fff;font-weight:800;font-size:13px;padding:11px 17px;border-radius:11px;cursor:pointer;transition:.16s var(--ease);font-family:inherit}
  .tl-add:hover{transform:translateY(-2px);box-shadow:0 10px 22px rgba(22,163,74,.32)}
  .save-note{font-size:13px;color:var(--green-d);display:flex;align-items:center;gap:7px;background:rgba(22,163,74,.08);border:1px solid rgba(22,163,74,.26);padding:12px 15px;border-radius:12px;margin-bottom:16px;flex-wrap:wrap}
  .save-note b{color:var(--text)}
  .annual-note{background:rgba(37,99,235,.07);border:1px solid rgba(37,99,235,.24);color:var(--blue-d);font-size:13.5px;padding:17px 19px;border-radius:14px;line-height:1.7}
  .annual-note b{color:var(--text)}

  /* ===== font controls ===== */
  .fc-wrap{display:grid;grid-template-columns:1.1fr 1fr;gap:18px}
  @media(max-width:680px){.fc-wrap{grid-template-columns:1fr}}
  .fc-row{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
  .fc-row .lbl{font-size:12px;font-weight:800;color:var(--muted);width:64px}
  .chip{border:1px solid var(--gline);background:#F7FAFD;color:var(--muted);font-weight:800;font-size:13px;padding:9px 14px;border-radius:10px;cursor:pointer;transition:.16s var(--ease);font-family:inherit}
  .chip:hover{color:var(--text);border-color:rgba(14,156,134,.4)}
  .chip.on{background:linear-gradient(135deg,var(--green),var(--teal));color:#fff;border-color:transparent;box-shadow:0 6px 14px rgba(22,163,74,.28)}
  .fc-preview{background:#F7FAFD;border:1px dashed rgba(20,35,59,.18);border-radius:14px;padding:19px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;gap:6px;min-height:130px}
  .fc-preview .cap{font-size:11px;font-weight:800;color:var(--muted2);text-transform:uppercase;letter-spacing:.5px}
  .colorgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  @media(max-width:560px){.colorgrid{grid-template-columns:repeat(2,1fr)}}
  .colorf{display:flex;align-items:center;gap:10px;background:#F7FAFD;border:1px solid var(--gline);border-radius:12px;padding:11px 13px;transition:.16s;cursor:pointer}
  .colorf:hover{border-color:rgba(14,156,134,.4)}
  .colorf input[type=color]{width:40px;height:40px;border:none;background:none;border-radius:9px;cursor:pointer;padding:0}
  .colorf span{font-size:12.5px;font-weight:700;color:var(--text)}

  /* ===== entrance reveal (driven by GSAP) ===== */
  .reveal{opacity:0;transform:translateY(20px)}

  /* ===== ApexCharts light theming ===== */
  .apexcharts-canvas{background:transparent!important}
  .apexcharts-tooltip{font-family:'Cairo','Tajawal',sans-serif!important;background:#FFFFFF!important;border:1px solid var(--gline)!important;box-shadow:0 16px 40px rgba(20,40,80,.16)!important;color:var(--text)!important;border-radius:12px!important}
  .apexcharts-tooltip-title{background:#F5F8FB!important;border-bottom:1px solid var(--gline)!important;font-weight:800!important;color:var(--text)!important}
  .apexcharts-xaxistooltip,.apexcharts-yaxistooltip{background:#FFFFFF!important;border:1px solid var(--gline)!important;color:var(--text)!important}
  .apexcharts-text,.apexcharts-datalabel,.apexcharts-xaxis-label,.apexcharts-yaxis-label{font-family:'Cairo','Tajawal',sans-serif!important}
  .apexcharts-gridline{stroke:var(--gline)!important}

  /* ===== count badge + percent (Attrition by Tenure / Saudi Recruits) ===== */
  .vsplit{display:inline-flex;align-items:center;gap:9px;justify-content:flex-end}
  .cnt{display:inline-flex;align-items:center;justify-content:center;min-width:32px;background:#EEF3FA;color:var(--text);font-weight:800;border-radius:9px;padding:3px 10px;font-size:14px;font-style:normal;border:1px solid var(--gline)}
  .pctv{color:var(--teal-d);font-weight:800;font-style:normal;font-size:14px;min-width:46px;text-align:right}

  /* ===== layout reorder toggle (details top/bottom) ===== */
  .secflex{display:flex;flex-direction:column}
  .secflex.rev{flex-direction:column-reverse}

  /* ===== admin: display / language / edit controls ===== */
  .disp-wrap{display:flex;flex-direction:column;gap:16px}
  .disp-row{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
  .disp-lbl{font-size:13.5px;font-weight:800;color:var(--text);display:flex;align-items:center;gap:9px}
  .disp-ic{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--blue),var(--teal));color:#fff;font-size:14px;flex-shrink:0}
  .seg{display:inline-flex;background:#F2F6FB;border:1px solid var(--gline);border-radius:12px;padding:4px;gap:4px}
  .seg-btn{border:none;background:transparent;color:var(--muted);font-weight:800;font-size:13px;padding:9px 16px;border-radius:9px;cursor:pointer;transition:.18s var(--ease);font-family:inherit}
  .seg-btn:hover{color:var(--text)}
  .seg-btn.on{background:#fff;color:var(--text);box-shadow:0 4px 12px rgba(20,40,80,.13)}
  .switch{display:inline-flex;align-items:center;gap:11px;cursor:pointer;font-family:inherit;background:none;border:none;padding:0}
  .switch .track{width:54px;height:30px;border-radius:30px;background:#D7E0EA;border:1px solid var(--gline);position:relative;transition:.22s var(--ease);flex-shrink:0}
  .switch .knob{position:absolute;top:2px;left:2px;width:24px;height:24px;border-radius:50%;background:#fff;box-shadow:0 2px 6px rgba(20,40,80,.28);transition:.22s var(--ease)}
  .switch.on .track{background:linear-gradient(135deg,var(--green),var(--teal));border-color:transparent}
  .switch.on .knob{left:26px}
  .switch .switch-tx{font-size:13px;font-weight:800;color:var(--muted)}
  .switch.on .switch-tx{color:var(--green-d)}
  .disp-note{font-size:12px;color:var(--muted);background:rgba(37,99,235,.06);border:1px solid rgba(37,99,235,.18);border-radius:11px;padding:11px 13px;line-height:1.75}

  /* ===== inline text-edit mode ===== */
  .editing{outline:2px dashed rgba(37,99,235,.4);outline-offset:8px;border-radius:14px}
  .editing :is(h2,h3,.card-title,.card-lbl,.tb-title,.tb-sub,.k,.v,.lbl,.pill,.qbadge,.tab,.secbar h2,.tp-foot,.cnt,.pctv):hover{outline:1px dashed var(--blue);outline-offset:3px;border-radius:5px;cursor:text;background:rgba(37,99,235,.05)}

  /* ===== RTL (Arabic) adjustments ===== */
  .shell.rtl{direction:rtl}
  .shell.rtl .qbadge,.shell.rtl .dept-banner button{margin-left:0;margin-right:auto}
  .shell.rtl .tp-delta,.shell.rtl .disp-note{text-align:right}
  .shell.rtl .secbar::before{left:auto;right:0}
  .shell.rtl .secbar h2{padding-left:0;padding-right:6px}

  /* ===== customize mode: resize + drag-reorder ===== */
  .customize .card.wide{resize:both;overflow:hidden;min-height:150px;max-width:100%}
  .customize .drag-item > .card,.customize .drag-item > .kpibox{resize:both;overflow:hidden;min-width:150px;min-height:110px;max-width:100%}
  .customize .card::after,.customize .card.wide::after{content:"⤢";position:absolute;right:9px;bottom:7px;font-size:13px;color:var(--muted2);opacity:.6;pointer-events:none;z-index:3}
  .drag-item{position:relative;transition:transform .2s var(--ease);min-width:0}
  .sorting .drag-item > .card,.sorting .drag-item > .kpibox{outline:1.5px dashed rgba(37,99,235,.4);outline-offset:4px;animation:wiggle 1.2s ease-in-out infinite}
  .sorting .drag-item.over{transform:scale(1.04)}
  .sorting .drag-item.over > .card,.sorting .drag-item.over > .kpibox{outline-color:var(--teal);box-shadow:0 16px 40px rgba(14,156,134,.28);animation:none}
  .drag-grip{position:absolute;top:8px;right:8px;z-index:7;width:28px;height:28px;border-radius:9px;display:flex;align-items:center;justify-content:center;background:rgba(37,99,235,.16);border:1px solid rgba(37,99,235,.34);color:var(--blue-d);cursor:grab;font-size:15px;line-height:1;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px)}
  .drag-grip:hover{background:rgba(37,99,235,.26)}
  .drag-grip:active{cursor:grabbing}
  @keyframes wiggle{0%,100%{transform:rotate(-.55deg)}50%{transform:rotate(.55deg)}}

  /* ===== animated floating pixel squares ===== */
  .fx-0{background:rgba(14,156,134,.20)} .fx-1{background:rgba(37,99,235,.18)} .fx-2{background:rgba(22,163,74,.17)} .fx-3{background:rgba(201,130,26,.16)}
  @keyframes floatUp{0%{transform:translateY(0) rotate(0deg);opacity:0}12%{opacity:.9}88%{opacity:.9}100%{transform:translateY(-112vh) rotate(240deg);opacity:0}}
  @media (prefers-reduced-motion: reduce){ .secbar::after{animation:none} }

  /* ===== merge quarters control (topbar) ===== */
  .mergebox{display:flex;align-items:center;gap:4px;padding:4px 7px;border:1px dashed #cdd8e6;border-radius:11px;background:#fff}
  .mergebox.on{border-color:var(--teal);background:rgba(14,156,134,.07)}
  .merge-lbl{font-size:11.5px;font-weight:800;color:var(--muted);margin:0 2px}
  .merge-q{font-size:11.5px;font-weight:800;padding:4px 8px;border-radius:8px;border:1px solid transparent;background:#eef3f9;color:var(--text);cursor:pointer;font-family:inherit}
  .merge-q.sel{background:var(--teal);color:#fff}
  .merge-tag{font-size:11.5px;font-weight:900;color:var(--teal);padding:0 4px}
  .merge-clear{font-size:12px;font-weight:900;border:none;background:none;color:var(--red);cursor:pointer;padding:0 2px}

  /* ===== admin quarter selector ===== */
  .adm-qbar{display:flex;align-items:center;flex-wrap:wrap;gap:7px;padding:12px 14px;margin-bottom:14px;background:linear-gradient(90deg,rgba(14,156,134,.10),rgba(37,99,235,.07));border:1px solid #dde7f1;border-radius:14px}
  .adm-qbar-lbl{font-size:13px;font-weight:800;color:var(--text)}
  .adm-q{font-size:13px;font-weight:800;padding:6px 14px;border-radius:9px;border:1px solid #d4deea;background:#fff;color:var(--text);cursor:pointer;font-family:inherit}
  .adm-q.on{background:var(--green);border-color:var(--green);color:#fff;box-shadow:0 4px 12px rgba(22,163,74,.25)}
  .adm-qbar-now{margin-right:auto;font-size:12.5px;font-weight:800;color:var(--teal)}

  /* ===== print: All Sections on A4 ===== */
  @media print{
    @page{ size:A4 landscape; margin:8mm }
    html,body{ background:#fff !important }
    #bglayer,#bgveil{ display:none !important }
    .topbar .tb-right,.ctrlbar,.dept-banner,.drag-grip,.merge-clear{ display:none !important }
    .topbar{ position:static !important;box-shadow:none !important;border:none !important;border-bottom:2px solid var(--green);border-radius:0 !important;margin-bottom:10px !important }
    .shell{ zoom:.56;max-width:none !important;padding:0 !important }
    .reveal{ opacity:1 !important;transform:none !important }
    .card,.adm-card{ box-shadow:none !important;border:1px solid #dde5ee !important;break-inside:avoid;page-break-inside:avoid;animation:none !important }
    .secblock{ break-inside:avoid }
    .secbar::after{ animation:none !important }
    .apx,.scrollx{ overflow:visible !important }
  }

</style>
</head>

function aggregate(all){
  const qs=Array.isArray(all)?all:QUARTERS.map(q=>all[q]);
  const sum=f=>qs.reduce((a,q)=>a+(Number(f(q))||0),0);
  const avg=f=>sum(f)/qs.length;
  const A=clone(INITIAL);
  A.demo.total=Number(qs[qs.length-1].demo.total)||0;
  {const lq=qs[qs.length-1];DEPTS.forEach(dep=>{A.demo.saudi[dep]=Number(lq.demo.saudi[dep])||0;A.demo.nonSaudi[dep]=Number(lq.demo.nonSaudi[dep])||0;});}
  DEPTS.forEach(dep=>{ const us=new Set(),un=new Set(); qs.forEach(q=>{((q.demo.saudiNames&&q.demo.saudiNames[dep])||[]).forEach(x=>x&&us.add(x));((q.demo.nonSaudiNames&&q.demo.nonSaudiNames[dep])||[]).forEach(x=>x&&un.add(x));}); A.demo.saudiNames[dep]=[...us]; A.demo.nonSaudiNames[dep]=[...un]; });
  A.demo.turnover=+avg(q=>q.demo.turnover).toFixed(2); A.demo.attrition=sum(q=>q.demo.attrition);
  A.demo.divFemale=Number(qs[qs.length-1].demo.divFemale)||0; A.demo.divMale=Number(qs[qs.length-1].demo.divMale)||0;
  A.demo.saudization=+avg(q=>q.demo.saudization).toFixed(2); A.demo.pwdPct=+avg(q=>q.demo.pwdPct).toFixed(2); A.demo.pwdCount=Number(qs[qs.length-1].demo.pwdCount)||0;
  ["total","replacement","newPosition","closed","onProcess","onHold","notStarted","saudiPWD","male","female","nonSaudi","nettaqat","specialExpat"].forEach(k=>A.acq[k]=sum(q=>q.acq[k]));
  A.acq.malePct=Math.round(avg(q=>q.acq.malePct)); A.acq.femalePct=Math.round(avg(q=>q.acq.femalePct));
  DEPTS.forEach(dep=>A.acq.hiring[dep]=sum(q=>q.acq.hiring[dep]));
  ["onJob","coaching","formal"].forEach(k=>Object.keys(A.learn[k]).forEach(f=>A.learn[k][f]=sum(q=>q.learn[k][f])));
  A.er.turnover=+avg(q=>q.er.turnover).toFixed(2); A.er.attrition=sum(q=>q.er.attrition);
  ["resignation","termination","retirement","tenureLess","tenureMore","natSaudi","natNonSaudi","totalCollected"].forEach(k=>A.er[k]=sum(q=>q.er[k]));
  A.er.tenureLessPct=+avg(q=>q.er.tenureLessPct).toFixed(2); A.er.tenureMorePct=+avg(q=>q.er.tenureMorePct).toFixed(2);
  DEPTS.forEach(dep=>A.er.attr[dep]=sum(q=>q.er.attr[dep]));
  MONTHS.forEach(m=>A.er.hrdf[m]=+sum(q=>q.er.hrdf[m]).toFixed(2));
  DEPTS.forEach(dep=>A.er.vac[dep]={used:Math.round(avg(q=>q.er.vac[dep].used)),remaining:Math.round(avg(q=>q.er.vac[dep].remaining))});
  const names={}; qs.forEach(q=>(q.er.turnoverList||[]).forEach(r=>{ if(!names[r.name])names[r.name]={name:r.name,hc:[],dep:0}; names[r.name].hc.push(Number(r.headcount)||0); names[r.name].dep+=(Number(r.departures)||0); }));
  A.er.turnoverList=Object.values(names).map(o=>({name:o.name,headcount:Math.round(o.hc.reduce((a,b)=>a+b,0)/o.hc.length),departures:o.dep}));
  A.sum.turnover=+avg(q=>q.sum.turnover).toFixed(2); A.sum.attrition=sum(q=>q.sum.attrition);
  A.sum.regrettable=+avg(q=>q.sum.regrettable).toFixed(2); A.sum.regrettableCount=sum(q=>q.sum.regrettableCount); A.sum.saudization=+avg(q=>q.sum.saudization).toFixed(2);
  A.sum.divFemale=Math.round(avg(q=>q.sum.divFemale)); A.sum.divMale=Math.round(avg(q=>q.sum.divMale));
  A.sum.divFemalePct=Math.round(avg(q=>q.sum.divFemalePct)); A.sum.divMalePct=Math.round(avg(q=>q.sum.divMalePct));
  return A;
}

function useCount(target, dec=0, dur=1.2){
  const [v,setV]=useState(0);
  useEffect(()=>{ const o={v:0}; const t=gsap.to(o,{v:Number(target)||0,duration:dur,ease:"power2.out",onUpdate:()=>setV(o.v)}); return ()=>t.kill(); },[target]);
  const f=Math.pow(10,dec);
  return (Math.round(v*f)/f).toLocaleString(undefined,{minimumFractionDigits:dec,maximumFractionDigits:dec});
}
const Count = ({v,dec=0,pre="",suf=""}) => <span className="num">{pre}{useCount(v,dec)}{suf}</span>;

/* ===== Premium chart primitives — ApexCharts (Light & Lightweight) =====
   نفس أسماء الدوال ونفس الـ props ونفس مصادر البيانات تمامًا.
   لم تُغيَّر أي قيمة أو منطق — فقط طبقة العرض، مع تبسيط الحركات والتأثيرات للأداء. */

function cssVar(n){ try{ return getComputedStyle(document.documentElement).getPropertyValue(n).trim(); }catch(e){ return ""; } }
function resolveColor(c){
  if(c===0) return "#0E9C86";
  if(!c) return "#0E9C86";
  c=String(c).trim();
  if(c.indexOf("var(")===0){ const m=c.match(/var\(\s*(--[A-Za-z0-9-]+)\s*\)/); const v=m?cssVar(m[1]):""; return (v||"#0E9C86"); }
  return c;
}
function hexToRgba(hex,a){
  let h=resolveColor(hex); if(typeof h!=="string"||h[0]!=="#") return h;
  if(h.length===4){ h="#"+h[1]+h[1]+h[2]+h[2]+h[3]+h[3]; }
  const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
  if(isNaN(r)||isNaN(g)||isNaN(b)) return hex;
  return "rgba("+r+","+g+","+b+","+a+")";
}
const AX_FONT = "'Cairo','Tajawal','Sakkal Majalla',system-ui,sans-serif";
const axColor = (v,f)=> (cssVar(v)||f);

/* حركات خفيفة وموحّدة لكل الرسوم (سريعة + بدون hover-filter ثقيل) */
const ANIM = { enabled:true, speed:550, animateGradually:{enabled:false}, dynamicAnimation:{enabled:false} };
const NOFX = { hover:{ filter:{type:"none"} }, active:{ filter:{type:"none"}, allowMultipleDataPointsSelection:false } };

/* generic ApexCharts hook: destroy & rebuild whenever deps change */
function useApex(build, deps){
  const ref=useRef(null), inst=useRef(null);
  useEffect(()=>{
    if(!ref.current || !window.ApexCharts) return;
    try{ if(inst.current){ inst.current.destroy(); inst.current=null; } }catch(e){}
    let opts; try{ opts=build(); }catch(e){ return; }
    let chart;
    try{ chart=new window.ApexCharts(ref.current, opts); inst.current=chart; chart.render(); }catch(e){}
    return ()=>{ try{ if(inst.current){ inst.current.destroy(); inst.current=null; } }catch(e){} };
  // eslint-disable-next-line
  }, deps);
  // إعادة تأقلم الرسم مع تغيّر حجم البطاقة الحاوية
  useEffect(()=>{
    if(!ref.current || !window.ResizeObserver) return;
    let raf;
    const ro=new ResizeObserver(()=>{ cancelAnimationFrame(raf); raf=requestAnimationFrame(()=>{ try{ window.dispatchEvent(new Event("resize")); }catch(e){} }); });
    try{ ro.observe(ref.current); }catch(e){}
    return ()=>{ try{ ro.disconnect(); }catch(e){} cancelAnimationFrame(raf); };
  }, []);
  return ref;
}

/* Radial progress (Saudization, PWD, Turnover…) */
function Ring({value,target,label,accent="var(--teal)",suffix="%",max,note}){
  const v=Number(value)||0, t=Number(target)||0;
  const cap=max||Math.max(v,t)*1.4||100;
  const pct=Math.max(0,Math.min((cap?(v/cap)*100:0)||0,100));
  const col=resolveColor(accent);
  const ref=useApex(()=>({
    chart:{ type:"radialBar", height:178, fontFamily:AX_FONT, sparkline:{enabled:true},
      animations:ANIM, background:"transparent", redrawOnParentResize:false },
    theme:{mode:"light"},
    series:[ +pct.toFixed(2) ],
    colors:[ col ],
    plotOptions:{ radialBar:{
      startAngle:-135, endAngle:135, hollow:{ size:"58%" },
      track:{ background: axColor("--track","rgba(21,48,59,.08)"), strokeWidth:"100%", margin:2 },
      dataLabels:{
        name:{ show:true, offsetY:22, color: axColor("--muted","#566872"), fontSize:"11px", fontWeight:700, formatter:()=>"Target "+t+suffix },
        value:{ show:true, offsetY:-14, color: axColor("--text","#15303B"), fontSize:"25px", fontWeight:800, formatter:()=> (v)+suffix }
      }
    }},
    fill:{ type:"solid", colors:[ col ] },
    stroke:{ lineCap:"round" },
    states:NOFX,
    labels:[ label ]
  }), [v,t,cap,col,suffix]);
  const meets=v>=t;
  return (<div className="card ringwrap reveal">
    <div ref={ref} className="apx" style={{width:"100%",minHeight:178}}></div>
    <div style={{fontSize:13,fontWeight:700,color:"var(--muted)",marginTop:4}}>{label}</div>
    {note && <div style={{fontSize:11.5,color:"var(--muted2)",marginTop:3}}>{note}</div>}
    <div className={"pill "+(meets?"ok":"bad")} style={{marginTop:8}}>{meets?"▲ Above target":"▼ Below target"}</div>
  </div>);
}

/* ===== animated floating pixel squares (background life) ===== */
function FloatingShapes(){
  const arr=[]; for(let i=0;i<16;i++) arr.push(i);
  return (<div className="fx-shapes" aria-hidden="true">
    {arr.map(i=>{ const sz=10+(i%4)*5; return (
      <span key={i} className={"fx-sq fx-"+(i%4)} style={{left:((i*6.3+4)%97)+"%", width:sz, height:sz,
        animationDelay:(-(i*1.3))+"s", animationDuration:(13+(i%5)*3)+"s"}}></span>); })}
  </div>);
}

/* ===== iOS-style drag-to-reorder container (enabled via context.reorder) ===== */
function Sortable({className,style,children}){
  const ctx=useContext(Ctx); const enabled=!!(ctx&&ctx.customize);
  const items=React.Children.toArray(children);
  const [order,setOrder]=useState(()=>items.map((_,i)=>i));
  const dragFrom=useRef(null);
  const [over,setOver]=useState(null);
  useEffect(()=>{ setOrder(o=> (o.length===items.length ? o : items.map((_,i)=>i))); }, [items.length]);
  if(!enabled) return <div className={className} style={style}>{items}</div>;
  const move=(from,to)=>setOrder(o=>{ if(from===to||from==null) return o; const a=o.slice(); const [m]=a.splice(from,1); a.splice(to,0,m); return a; });
  return (<div className={(className||"")+" sorting"} style={style}>
    {order.map((ci,pos)=>(
      <div key={ci} className={"drag-item"+(over===pos?" over":"")}
        onDragOver={(e)=>{ e.preventDefault(); if(over!==pos) setOver(pos); }}
        onDragLeave={()=>{ if(over===pos) setOver(null); }}
        onDrop={(e)=>{ e.preventDefault(); move(dragFrom.current,pos); dragFrom.current=null; setOver(null); }}>
        <span className="drag-grip" draggable title="اسحب لتغيير المكان"
          onDragStart={(e)=>{ dragFrom.current=pos; try{ e.dataTransfer.effectAllowed="move"; e.dataTransfer.setData("text/plain","card"); }catch(_){} }}
          onDragEnd={()=>{ dragFrom.current=null; setOver(null); }}>⠿</span>
        {items[ci]}
      </div>
    ))}
  </div>);
}

/* ===== compact Total Attrition KPI card (same logic as TurnoverPanel) ===== */
function AttritionMini(){
  const {d,all,quarter,dept}=useContext(Ctx);

  const isDept=dept!=="All";
  const idx=QUARTERS.indexOf(quarter);
  const prev=idx>0?all[QUARTERS[idx-1]]:null;

/* ===== merge/combine quarters control (topbar) ===== */
function MergeControl(){
  const {combine,setCombine}=useContext(Ctx);

  const active=c.length>=2;
  return (<div className={"mergebox"+(active?" on":"")} title="دمج كوارترات (اختر 2 أو أكثر)">

function TurnoverPanel(){

  const idx=QUARTERS.indexOf(quarter);

    list=[{name:dept,i:0,hc,lf,pct:hc>0?lf/hc*100:0}];
    bigPct=hc>0?lf/hc*100:0; employees=lf; headcount=hc;
  } else {
    list=(e.turnoverList||[]).map((r,i)=>{const hc=Number(r.headcount)||0,lf=Number(r.departures)||0;return {name:r.name,i,hc,lf,pct:hc>0?lf/hc*100:0};}).sort((a,b)=>b.pct-a.pct);

        <div className="nm">{r.name}</div>
        <div className="tp-bar"><div style={{width:(r.pct/maxPct*100)+"%",background:`linear-gradient(90deg,${colors.turnover},var(--teal))`}}/></div>

  const {all,setAll}=useContext(Ctx);

    <input type="number" step={step} value={obj[k]} onChange={e=>{obj[k]=e.target.value===""?0:Number(e.target.value);setAll(clone(all));}}/></div>);
}
function DeptTable({obj,cols}){
  const {all,setAll}=useContext(Ctx);
  return (<div className="scrollx"><table className="adm">
    <thead><tr><th style={{textAlign:"left"}}>Dept</th>{cols.map(c=><th key={c.label}>{c.label}</th>)}</tr></thead>
    <tbody>{DEPTS.map(dep=>(<tr key={dep}><td className="dept">{dep}</td>
      {cols.map(c=>(<td key={c.label} style={{width:90}}><input type="number" step={c.step||1} value={c.get(obj,dep)} onChange={e=>{c.set(obj,dep,e.target.value===""?0:Number(e.target.value));setAll(clone(all));}}/></td>))}
    </tr>))}</tbody></table></div>);
}
function NamesEditor(){
  const {all,setAll,d}=useContext(Ctx); const [dep,setDep]=useState(DEPTS[0]); const demo=d.demo;
  if(!demo.saudiNames) demo.saudiNames=ZA(); if(!demo.nonSaudiNames) demo.nonSaudiNames=ZA();
  const toText=arr=>(arr||[]).join("\n");
  const setNames=(field,text)=>{ demo[field][dep]=text.split("\n"); setAll(clone(all)); };
  const sc=(demo.saudiNames[dep]||[]).filter(n=>String(n).trim()).length;
  const nc=(demo.nonSaudiNames[dep]||[]).filter(n=>String(n).trim()).length;
  return (<div>
    <div className="adm-f" style={{maxWidth:340,marginBottom:14}}><label>Department</label>
      <select value={dep} onChange={e=>setDep(e.target.value)}>{DEPTS.map(dp=><option key={dp} value={dp}>{dp}</option>)}</select></div>
    <div className="adm-grid" style={{gridTemplateColumns:"1fr 1fr"}}>
      <div className="adm-f"><label>Saudi employee names — one per line ({sc})</label><textarea value={toText(demo.saudiNames[dep])} onChange={e=>setNames("saudiNames",e.target.value)} placeholder={"Name 1\nName 2\nName 3"}/></div>
      <div className="adm-f"><label>Non-Saudi employee names — one per line ({nc})</label><textarea value={toText(demo.nonSaudiNames[dep])} onChange={e=>setNames("nonSaudiNames",e.target.value)} placeholder={"Name 1\nName 2"}/></div>
    </div>
  </div>);
}
function DemoDeptTable(){
  const {all,setAll,d}=useContext(Ctx); const demo=d.demo;
  const upd=(dep,field,val)=>{demo[field][dep]=val===""?0:Number(val);setAll(clone(all));};
  return (<div className="scrollx"><table className="adm">
    <thead><tr><th style={{textAlign:"left"}}>Dept</th><th>Saudi</th><th>Non-Saudi</th><th>Head</th><th>Saud %</th></tr></thead>
    <tbody>{DEPTS.map(dep=>{const s=Number(demo.saudi[dep])||0,n=Number(demo.nonSaudi[dep])||0,h=s+n,p=h>0?(s/h*100).toFixed(1):"0.0";
      return (<tr key={dep}><td className="dept">{dep}</td>
        <td style={{width:84}}><input type="number" value={demo.saudi[dep]} onChange={e=>upd(dep,"saudi",e.target.value)}/></td>
        <td style={{width:84}}><input type="number" value={demo.nonSaudi[dep]} onChange={e=>upd(dep,"nonSaudi",e.target.value)}/></td>
        <td className="dept" style={{textAlign:"center",fontWeight:800,color:"var(--text)"}}>{h}</td>
        <td className="dept" style={{textAlign:"center",fontWeight:800,color:"var(--teal-d)"}}>{p}%</td>
      </tr>);})}</tbody></table></div>);
}
function TurnoverEditor(){
  const {all,setAll,d}=useContext(Ctx); const list=d.er.turnoverList||(d.er.turnoverList=[]);
  const upd=(i,field,val)=>{ list[i][field]= field==="name"?val:(val===""?0:Number(val)); setAll(clone(all)); };
  const add=()=>{ list.push({name:"New Department",headcount:0,departures:0}); setAll(clone(all)); };
  const del=(i)=>{ list.splice(i,1); setAll(clone(all)); };
  return (<div>
    <div className="tl-row" style={{fontSize:11,color:"var(--muted)",fontWeight:700,textTransform:"uppercase"}}><div>Department</div><div style={{textAlign:"center"}}>Headcount</div><div style={{textAlign:"center"}}>Departures</div><div style={{textAlign:"center"}}>Rate</div><div></div></div>
    {list.map((r,i)=>{ const hc=Number(r.headcount)||0,lf=Number(r.departures)||0; const pct=hc>0?(lf/hc*100):0;
      return (<div className="tl-row" key={i}>
        <input value={r.name} onChange={e=>upd(i,"name",e.target.value)}/>
        <input type="number" value={r.headcount} onChange={e=>upd(i,"headcount",e.target.value)}/>
        <input type="number" value={r.departures} onChange={e=>upd(i,"departures",e.target.value)}/>
        <div className="tl-pct num">{pct.toFixed(1)}%</div>
        <button className="tl-del" onClick={()=>del(i)}>×</button>
      </div>);})}
    <button className="tl-add" onClick={add}>+ Add Department</button>
  </div>);
}

function FontControls(){
  const {fs,setFs}=useContext(Ctx);
  const sizes=[{l:"S",v:.9},{l:"M",v:1},{l:"L",v:1.15},{l:"XL",v:1.3},{l:"2XL",v:1.45}];
  const weights=[{l:"Thin",v:300},{l:"Normal",v:400},{l:"Bold",v:700}];
  return (<div className="fc-wrap">
    <div>
      <div className="fc-row"><span className="lbl">Size</span>{sizes.map(s=>(<button key={s.l} className={"chip"+(Math.abs(fs.scale-s.v)<.001?" on":"")} onClick={()=>setFs({...fs,scale:s.v})}>{s.l}</button>))}</div>
      <div className="fc-row"><span className="lbl">Weight</span>{weights.map(w=>(<button key={w.v} className={"chip"+(fs.weight===w.v?" on":"")} onClick={()=>setFs({...fs,weight:w.v})}>{w.l}</button>))}</div>
      <div className="fc-row"><span className="lbl">Style</span>
        <button className={"chip"+(fs.style==="normal"?" on":"")} onClick={()=>setFs({...fs,style:"normal"})}>Normal</button>
        <button className={"chip"+(fs.style==="italic"?" on":"")} onClick={()=>setFs({...fs,style:"italic"})}>Italic</button></div>
    </div>
    <div className="fc-preview">
      <div className="cap">Live preview · {Math.round(fs.scale*100)}%</div>
      <div style={{fontSize:(20*fs.scale)+"px",fontWeight:fs.weight,fontStyle:fs.style,lineHeight:1.5}}>SAJA — نموذج خط المجلة</div>
      <div className="num" style={{fontSize:(16*fs.scale)+"px",fontWeight:fs.weight,fontStyle:fs.style,color:"var(--muted)"}}>0123456789 · 58.36%</div>
    </div>
  </div>);
}

function ColorControls(){
  const {colors,setColors}=useContext(Ctx);
  const items=[["head","شارت Head Count فقط"],["saudHigh","شارت Saudization — فوق 50%"],["saudLow","شارت Saudization — تحت 50%"],["hiring","شارت Hiring فقط"],["turnover","شارت Attrition (الأعمدة)"],["vacUsed","شارت Vacation — Used"],["vacRemain","شارت Vacation — Remaining"],["line","شارت HRDF (الخط)"]];
  return (<div className="colorgrid">
    {items.map(([k,lbl])=>(<label className="colorf" key={k}>
      <input type="color" value={colors[k]} onChange={e=>setColors({...colors,[k]:e.target.value})}/>
      <span>{lbl}</span></label>))}
  </div>);
}

function Admin(){
  const {d,quarter}=useContext(Ctx);
  if(quarter==="Annual"){
    return (<div>
      <AdminQuarterBar/>
      <div className="adm-card"><h3><span className="ic"></span>Display &amp; Font</h3><FontControls/></div>
      <div className="adm-card"><h3><span className="ic"></span>اللغة · حجم البطاقات · الترتيب · تعديل النصوص</h3><DisplayControls/></div>
      <div className="adm-card"><h3><span className="ic"></span>Chart Colors</h3><ColorControls/></div>

    <div className="adm-card"><h3><span className="ic"></span>Display &amp; Font</h3><FontControls/></div>

    <div className="adm-card"><h3><span className="ic"></span>Demographics</h3>

        <F obj={d.demo} k="total" label="Total Head Count"/><F obj={d.demo} k="saudization" label="Saudization % (overall)" step={.01}/><F obj={d.demo} k="saudTarget" label="Saudization Target %" step={.1}/>
        <F obj={d.demo} k="pwdPct" label="PWD %" step={.1}/><F obj={d.demo} k="pwdCount" label="PWD Count"/><F obj={d.demo} k="pwdTarget" label="PWD Target %" step={.1}/>
        <F obj={d.demo} k="turnover" label="Turnover %" step={.01}/><F obj={d.demo} k="attrition" label="Total Attrition"/>
        <F obj={d.demo} k="divMale" label="Diversity · Male (count)"/><F obj={d.demo} k="divFemale" label="Diversity · Female (count)"/>
      </div>
      <h3 style={{marginTop:18}}><span className="ic"></span>Saudi &amp; Non-Saudi per Dept (Head Count &amp; Saud % auto-calculated)</h3>
      <DemoDeptTable/>

    <div className="adm-card"><h3><span className="ic"></span>Employee Names (per Department)</h3><NamesEditor/></div>

        <F obj={d.acq} k="total" label="Total"/><F obj={d.acq} k="replacement" label="Replacement"/><F obj={d.acq} k="newPosition" label="New Position"/>
        <F obj={d.acq} k="closed" label="Closed"/><F obj={d.acq} k="onProcess" label="On Process"/><F obj={d.acq} k="onHold" label="On Hold"/>
        <F obj={d.acq} k="notStarted" label="Not Started"/><F obj={d.acq} k="saudiPWD" label="Saudi · PWD"/><F obj={d.acq} k="male" label="Male"/>
        <F obj={d.acq} k="malePct" label="Male %"/><F obj={d.acq} k="female" label="Female"/><F obj={d.acq} k="femalePct" label="Female %"/>
        <F obj={d.acq} k="nonSaudi" label="Non-Saudi"/><F obj={d.acq} k="nettaqat" label="Nettaqat"/><F obj={d.acq} k="specialExpat" label="Special Expat"/>
      </div>
      <h3 style={{marginTop:18}}><span className="ic"></span>Hiring 2026 per Dept</h3>
      <DeptTable obj={d.acq} cols={[{label:"Hires",get:(o,dep)=>o.hiring[dep],set:(o,dep,v)=>o.hiring[dep]=v}]}/>

        <F obj={d.learn.onJob} k="total" label="On the Job · Total"/><F obj={d.learn.onJob} k="completed" label="On the Job · Completed"/><F obj={d.learn.onJob} k="notStarted" label="On the Job · Not Started"/><F obj={d.learn.onJob} k="inProgress" label="On the Job · In Progress"/>
        <F obj={d.learn.coaching} k="total" label="Coaching · Total"/><F obj={d.learn.coaching} k="completed" label="Coaching · Completed"/><F obj={d.learn.coaching} k="notStarted" label="Coaching · Not Started"/><F obj={d.learn.coaching} k="inProgress" label="Coaching · In Progress"/>
        <F obj={d.learn.formal} k="total" label="Formal · Total"/><F obj={d.learn.formal} k="completed" label="Formal · Completed"/><F obj={d.learn.formal} k="upcoming" label="Formal · Upcoming"/><F obj={d.learn.formal} k="inProgress" label="Formal · In Progress"/>
      </div>

      <div className="adm-grid">
        <F obj={d.er} k="turnover" label="Turnover %" step={.01}/><F obj={d.er} k="turnoverTarget" label="Turnover Target %" step={.1}/><F obj={d.er} k="attrition" label="Total Attrition"/>
        <F obj={d.er} k="resignation" label="Resignation"/><F obj={d.er} k="termination" label="Termination"/><F obj={d.er} k="retirement" label="Retirement"/>
        <F obj={d.er} k="tenureLess" label="< 2yr Count"/><F obj={d.er} k="tenureLessPct" label="< 2yr %" step={.01}/><F obj={d.er} k="tenureMore" label="> 2yr Count"/>
        <F obj={d.er} k="tenureMorePct" label="> 2yr %" step={.01}/><F obj={d.er} k="natSaudi" label="Saudi (attrition)"/><F obj={d.er} k="natNonSaudi" label="Non-Saudi (attrition)"/>

      <div className="adm-grid">{MONTHS.map(m=>(<F key={m} obj={d.er.hrdf} k={m} label={m} step={.01}/>))}</div>
      <h3 style={{marginTop:18}}><span className="ic"></span>Attrition (departures) & Vacation per Dept</h3>

function Splash({onDone}){
  const imgRef=useRef(), haloRef=useRef();
  useEffect(()=>{ const tl=gsap.timeline({onComplete:onDone});
    tl.fromTo(imgRef.current,{opacity:0,scale:.82,filter:"drop-shadow(0 0 0 rgba(31,158,75,0))"},{opacity:1,scale:1,filter:"drop-shadow(0 0 28px rgba(31,158,75,.7))",duration:1.1,ease:"power2.out"})
      .fromTo(haloRef.current,{opacity:0,scale:.7},{opacity:1,scale:1.05,duration:1.1,ease:"power2.out"},0)
      .to(imgRef.current,{filter:"drop-shadow(0 0 42px rgba(211,58,58,.6))",duration:.7,ease:"sine.inOut"})
      .to([imgRef.current,haloRef.current],{opacity:0,scale:1.04,duration:.6,ease:"power2.in"},"+=.35");
  },[]);
  return (<div className="splash"><div className="ov"></div><div className="halo" ref={haloRef}></div><img ref={imgRef} src={LOGO} alt="SAJA"/></div>);
}

function App(){
  const [phase,setPhase]=useState("splash");
  const [section,setSection]=useState("demo");
  const [quarter,setQuarter]=useState("Q2");
  const [dept,setDept]=useState("All");
  const [all,setAll]=useState(()=>{ const o={}; QUARTERS.forEach(q=>o[q]=clone(INITIAL)); return o; });
  const [fs,setFs]=useState({scale:1,weight:400,style:"normal"});
  const [colors,setColors]=useState({...DEFAULT_COLORS});
  const [lang,setLang]=useState("en");
  const [customize,setCustomize]=useState(false);
  const [editMode,setEditMode]=useState(false);
  const [combine,setCombine]=useState([]);
  const [user,setUser]=useState(null);
  const [showLogin,setShowLogin]=useState(false);
  const [adminView,setAdminView]=useState(false);
  const root=useRef();

  useEffect(()=>{ const bg=document.getElementById("bglayer");
    const onMove=e=>{ const x=(e.clientX/window.innerWidth-.5),y=(e.clientY/window.innerHeight-.5); bg.style.transform=`scale(1.08) translate(${-x*16}px, ${-y*16}px)`; };
    window.addEventListener("mousemove",onMove); return ()=>window.removeEventListener("mousemove",onMove); },[]);

  useEffect(()=>{ if(phase==="app"&&root.current){ const els=root.current.querySelectorAll(".reveal"); gsap.to(els,{opacity:1,y:0,duration:.55,stagger:.05,ease:"power2.out"}); } },[phase,section,adminView,quarter,dept]);

  if(phase==="splash") return <Splash onDone={()=>setPhase("app")}/>;
  const d = (!adminView && combine && combine.length>=2) ? aggregate(combine.map(q=>all[q])) : (quarter==="Annual" ? aggregate(all) : all[quarter]);
  const showAll=section==="all"; const isDept=dept!=="All";

  return (<Ctx.Provider value={{all,setAll,quarter,setQuarter,d,fs,setFs,colors,setColors,dept,lang,setLang,customize,setCustomize,editMode,setEditMode,combine,setCombine}}>
    {showLogin && <LoginModal onClose={()=>setShowLogin(false)} onAuth={u=>{setUser(u);setShowLogin(false);setAdminView(true);}}/>}
    <div className={"shell"+(lang==="ar"?" rtl":"")} dir={lang==="ar"?"rtl":"ltr"} ref={root} style={{zoom:fs.scale,fontWeight:fs.weight,fontStyle:fs.style}}>
      <div className="topbar">
        <div className="tb-left"><img src={LOGO} alt="SAJA"/><div><div className="tb-title">HR Dashboard</div><div className="tb-sub">SAJA KSA · Presenter: HR KSA Operation Team</div></div></div>
        <div className="tb-right">
          <div className="qsel">
            {QUARTERS.map(q=>(<button key={q} className={(quarter===q&&(!combine||combine.length<2))?"on":""} onClick={()=>{setQuarter(q);setCombine([]);}}>{q}</button>))}
            <button className={"annual"+((quarter==="Annual"&&(!combine||combine.length<2))?" on":"")} onClick={()=>{setQuarter("Annual");setCombine([]);}}>Annual</button>
          </div>
          <MergeControl/>
          <button className="ghost" onClick={()=>{setAdminView(false);setSection("all");setTimeout(()=>window.print(),350);}} title="طباعة كل الأقسام على A4">🖨 طباعة</button>
          {user && <span style={{fontSize:12,color:"var(--muted)"}}>{user.name}</span>}
          {!user && <button className="ghost" onClick={()=>setShowLogin(true)}>Admin</button>}
          {user && <button className={"ghost "+(adminView?"live":"")} onClick={()=>setAdminView(v=>!v)}>{adminView?"View Dashboard":"Edit Data"}</button>}
          {user && <button className="ghost" onClick={()=>{setUser(null);setAdminView(false);}}>Sign out</button>}
        </div>
      </div>

      {adminView ? <Admin/> : (<div className={(editMode?"editing ":"")+(customize?"customize":"")} contentEditable={editMode} suppressContentEditableWarning={true}>
        <div className="ctrlbar">
          <div className="tabs">
            {SECTIONS.map(s=>(<button key={s.key} className={"tab"+(section===s.key?" active":"")} onClick={()=>setSection(s.key)}><span className="ic"></span>{s.label}</button>))}
            <button className={"tab"+(section==="all"?" active":"")} onClick={()=>setSection("all")}><span className="ic"></span>All Sections</button>
          </div>
          <div className="deptpick"><label>Department</label>
            <select value={dept} onChange={e=>setDept(e.target.value)}>
              <option value="All">All Departments</option>
              {DEPTS.map(dp=><option key={dp} value={dp}>{dp}</option>)}
            </select></div>
        </div>
        {isDept && <div className="dept-banner">📌 Viewing <b style={{margin:"0 4px"}}>{dept}</b> — department-level metrics are filtered; metrics without a per-department breakdown are tagged “Company-wide”.<button onClick={()=>setDept("All")}>Show all</button></div>}
        {showAll ? SECTIONS.map(s=>(<div className="secblock" key={s.key}><div className="secbar"><h2>{s.label}</h2></div><s.Comp/></div>))
          : (()=>{const S=SECTIONS.find(s=>s.key===section);return <div className="secblock"><div className="secbar"><h2>{S.label}</h2></div><S.Comp/></div>;})()}
      </div>)}
    </div>
  </Ctx.Provider>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
